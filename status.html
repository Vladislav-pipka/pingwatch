<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingWatch Status</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #0b1220;
      color: #e5e7eb;
      font-family: Inter, Arial, sans-serif;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .ok { color: #22c55e; }
    .bad { color: #ef4444; }
    .muted { color: #9ca3af; font-size: 14px; }
    .incident {
      border-top: 1px solid #1f2937;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="monitor-name">Loading...</h1>
      <div id="monitor-status"></div>
      <p class="muted" id="monitor-meta"></p>
    </div>

    <div class="card">
      <h2>Recent incidents</h2>
      <div id="incident-list">Loading...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xdkzdjlhmktqyagdiizl.supabase.co';
    const SUPABASE_KEY = 'ТВОЙ_SUPABASE_ANON_KEY';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    function formatRelativeTime(value) {
      if (!value) return 'Never';
      const diff = Date.now() - new Date(value).getTime();
      const s = Math.floor(diff / 1000);
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      return `${d}d ago`;
    }

    async function loadStatusPage() {
      if (!slug) {
        document.getElementById('monitor-name').textContent = 'Missing slug';
        document.getElementById('incident-list').innerHTML = '<p class="muted">Add ?slug=your-monitor-slug</p>';
        return;
      }

      const { data: monitor, error } = await sb
        .from('monitors')
        .select('*')
        .eq('status_slug', slug)
        .eq('is_public', true)
        .single();

      if (error || !monitor) {
        document.getElementById('monitor-name').textContent = 'Status page not found';
        document.getElementById('monitor-status').innerHTML = '<span class="bad">Unavailable</span>';
        document.getElementById('incident-list').innerHTML = '<p class="muted">No public monitor found for this slug.</p>';
        return;
      }

      const statusHtml = monitor.last_status === 'UP'
        ? '<span class="ok">● Operational</span>'
        : '<span class="bad">● Down</span>';

      document.getElementById('monitor-name').textContent = monitor.name;
      document.getElementById('monitor-status').innerHTML = statusHtml;
      document.getElementById('monitor-meta').textContent =
        `Last checked ${formatRelativeTime(monitor.last_checked_at)}`;

      const { data: incidents } = await sb
        .from('incidents')
        .select('*')
        .eq('monitor_id', monitor.id)
        .order('started_at', { ascending: false })
        .limit(10);

      const listEl = document.getElementById('incident-list');

      if (!incidents || !incidents.length) {
        listEl.innerHTML = '<p class="muted">No recent incidents</p>';
        return;
      }

      listEl.innerHTML = incidents.map(i => `
        <div class="incident">
          <div>${i.resolved_at ? 'Resolved incident' : 'Open incident'}</div>
          <div class="muted">
            Started: ${new Date(i.started_at).toLocaleString()}<br>
            ${i.error_reason ? `Reason: ${i.error_reason}<br>` : ''}
            ${i.duration_seconds ? `Duration: ${i.duration_seconds}s` : ''}
          </div>
        </div>
      `).join('');
    }

    loadStatusPage();
  </script>
</body>
</html>
